      <p>Heavendoo Foundation is a registered nonprofit organization based in Chandigarh, India, dedicated to large-scale, transparent reforestation. Every tree planted is GPS-tagged, publicly tracked, and audited.</p>
      <h2>Our Mission</h2>
      <p>We connect technology with nature. From GPS-tagged reforestation to peer-reviewed ecological papers, we make every leaf count. Our goal is to restore 100 million hectares of land by 2050.</p>
      <h2>What We Do</h2>
      <ul style="text-align:left;display:inline-block;">
        <li>Tree Aforestation — Large-scale native tree planting across India</li>
        <li>Public Tree Registry — GPS-verified, audited planting records</li>
        <li>Carbon Credit Crypto — Blockchain-backed carbon offset tokens</li>
        <li>Dynamic NFTs — Living digital twins of planted trees</li>
        <li>Water Desalination — Solar-powered purification for communities</li>
        <li>AI for Ecology — Computer vision and satellite monitoring</li>
      </ul>
